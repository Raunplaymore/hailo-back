services:
  storage-api:
    build:
      context: ./storage-api
    container_name: hailo-storage-api
    restart: unless-stopped
    environment:
      ARCHIVE_ROOT: /archive
      ARCHIVE_TOKEN: ${ARCHIVE_TOKEN:?Set ARCHIVE_TOKEN in .env}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-4294967296}
    volumes:
      - /volume1/hailo:/archive
    ports:
      # DSM Tailscale runs in userspace-networking mode, so this must stay loopback-only.
      # Tailscale Serve exposes it privately to the tailnet.
      - "${STORAGE_BIND_HOST:-127.0.0.1}:${STORAGE_API_PORT:-18080}:8080"
